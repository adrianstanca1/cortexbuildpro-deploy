
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cortex BuildPro - Advanced Construction Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#0ea5e9',
              secondary: '#f8fafc',
              midnight: '#020617',
              surface: '#0f172a',
            },
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'scan': 'scan 3s linear infinite',
              'spin-slow': 'spin 12s linear infinite',
              'pulse-glow': 'pulse-glow 2s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              scan: {
                '0%': { top: '0%' },
                '100%': { top: '100%' }
              },
              'pulse-glow': {
                '0%, 100%': { opacity: '0.4', filter: 'blur(8px)' },
                '50%': { opacity: '0.8', filter: 'blur(12px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
        -webkit-font-smoothing: antialiased;
        letter-spacing: -0.01em;
      }
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }
      .cortex-glow {
        box-shadow: 0 0 50px rgba(14, 165, 233, 0.15);
      }
      .blue-glow {
        box-shadow: 0 0 30px rgba(14, 165, 233, 0.3);
      }
      .neural-grid {
        background-image: radial-gradient(rgba(14, 165, 233, 0.05) 1px, transparent 1px);
        background-size: 32px 32px;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .glass-dark {
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .text-glow {
        text-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(14, 165, 233, 0.2);
        border-radius: 10px;
      }
      .blueprint-grid {
        background-image: linear-gradient(rgba(14, 165, 233, 0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(14, 165, 233, 0.06) 1px, transparent 1px);
        background-size: 24px 24px;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Navigation High-Fidelity Styling */
      .sidebar-item {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .sidebar-item.active, .sidebar-item.selected {
        background: rgba(14, 165, 233, 0.12);
        color: white !important;
        box-shadow: inset 0 0 20px rgba(14, 165, 233, 0.08);
      }
      .sidebar-item.active .lucide, .sidebar-item.selected .lucide {
        filter: drop-shadow(0 0 8px rgba(14, 165, 233, 0.8));
        color: #0ea5e9 !important;
      }
      .sidebar-item::before {
        content: '';
        position: absolute;
        left: 0;
        top: 25%;
        bottom: 25%;
        width: 3px;
        background: transparent;
        border-radius: 0 4px 4px 0;
        transition: all 0.4s ease;
      }
      .sidebar-item.active::before, .sidebar-item.selected::before {
        background: #0ea5e9;
        top: 0;
        bottom: 0;
        box-shadow: 0 0 15px #0ea5e9;
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.0/client",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react/jsx-runtime": "https://aistudiocdn.com/react@^19.2.0/jsx-runtime",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "leaflet": "https://unpkg.com/leaflet@1.9.4/dist/leaflet-src.esm.js"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="neural-grid">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
